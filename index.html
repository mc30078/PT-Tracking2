<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Warehouse Checklist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div>
        <h1>Daily Warehouse Checklist</h1>
        <p id="today-date" class="date-line"></p>
    </div>

    <div class="progress-wrapper">
        <svg class="progress-ring" width="90" height="90">
            <circle class="progress-ring-bg" cx="45" cy="45" r="38" />
            <circle class="progress-ring-fill" cx="45" cy="45" r="38" />
        </svg>
        <span id="progress-text">0%</span>
    </div>
</div>

<div class="task-list">

    <!-- 1. Review Email -->
    <div class="task-card task-email" data-task="Review Email">
        <h3>Review Email</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 2. Wayfair Orders -->
    <div class="task-card task-wayfair" data-task="Prepare Wayfair Orders">
        <h3>Prepare Wayfair Orders</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 3. Magnus Orders -->
    <div class="task-card task-magnus" data-task="Prepare Magnus Orders">
        <h3>Prepare Magnus Orders</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 4. Unbeatable Orders -->
    <div class="task-card task-unbeatable" data-task="Prepare Unbeatable Orders">
        <h3>Prepare Unbeatable Orders</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 5. Plumbtech Orders -->
    <div class="task-card task-plumbtech" data-task="Prepare Plumbtech Orders">
        <h3>Prepare Plumbtech Orders</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 6. Pick/Pack/Ship -->
    <div class="task-card task-pickpack" data-task="Pick/Pack/Ship All Orders">
        <h3>Pick/Pack/Ship All Orders</h3>
        <p class="subtext">Ship by 3:30 PM</p>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 7. Process Returns -->
    <div class="task-card task-returns" data-task="Process Returns">
        <h3>Process Returns</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

    <!-- 8. Daily Shipping Report -->
    <div class="task-card task-report" data-task="Email Daily Shipping Report">
        <h3>Email Daily Shipping Report</h3>
        <div class="button-row">
            <button class="complete-btn">Complete</button>
            <button class="na-btn">N/A</button>
        </div>
        <div class="timestamp"></div>
    </div>

</div>

<button id="reset-btn">Reset Checklist</button>

<script src="script.js"></script>
</body>
</html>
