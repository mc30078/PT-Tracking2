<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Warehouse Checklist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <h1>Daily Warehouse Checklist</h1>
    <div class="progress-circle">
        <span id="progress-text">0%</span>
    </div>
</div>

<div class="task-list">

    <!-- TASK TEMPLATE -->
    <div class="task-card" data-task="Review Email">
        <h3>Review Email</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Prepare Wayfair Orders">
        <h3>Prepare Wayfair Orders</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Prepare Magnus Orders">
        <h3>Prepare Magnus Orders</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Prepare Unbeatable Orders">
        <h3>Prepare Unbeatable Orders</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Prepare Plumbtech Orders">
        <h3>Prepare Plumbtech Orders</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Pick/Pack/Ship All Orders">
        <h3>Pick/Pack/Ship All Orders</h3>
        <p class="subtext">Ship by 3:30 PM</p>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Process Returns">
        <h3>Process Returns</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

    <div class="task-card" data-task="Email Daily Shipping Report">
        <h3>Email Daily Shipping Report</h3>
        <button class="complete-btn">Complete</button>
        <button class="na-btn">N/A</button>
        <div class="timestamp"></div>
    </div>

</div>

<button id="reset-btn">Reset Checklist</button>

<script src="script.js"></script>
</body>
</html>
